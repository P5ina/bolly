<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="core" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#c8a87a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8a6d3b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="body" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4a45a"/>
      <stop offset="60%" stop-color="#a07840"/>
      <stop offset="100%" stop-color="#6b4f2a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- outer glow -->
  <circle cx="64" cy="64" r="38" fill="#a07840" opacity="0.15" filter="url(#glow)"/>
  <!-- organic blob shape -->
  <path d="M64 26
    C82 26 98 38 101 56
    C104 72 96 88 82 96
    C72 102 56 104 44 98
    C30 90 24 74 26 58
    C28 40 44 26 64 26Z"
    fill="url(#body)" opacity="0.85"/>
  <!-- inner light -->
  <ellipse cx="62" cy="58" rx="18" ry="16" fill="url(#core)"/>
</svg>
