<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Transparent Video Test</title>
<style>
  body {
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
    padding: 2rem;
    font-family: system-ui;
  }
  .checkerboard {
    background: repeating-conic-gradient(#ccc 0% 25%, #fff 0% 50%) 50% / 20px 20px;
    border-radius: 12px;
    padding: 1rem;
  }
  video {
    max-width: 400px;
    display: block;
  }
  h2 { margin: 0 0 0.5rem; font-size: 1rem; }
  .info { font-size: 0.8rem; color: #666; }
  .row { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; }
</style>
</head>
<body>
<h1>Transparent Video Test</h1>
<p class="info" id="browser"></p>

<h2>WebM</h2>
<div class="row">
  <div class="checkerboard">
    <h2>idle-loop.webm</h2>
    <video loop muted autoplay playsinline src="/skins/mint/idle-loop.webm"></video>
  </div>
  <div class="checkerboard">
    <h2>typing.webm</h2>
    <video loop muted autoplay playsinline src="/skins/mint/typing.webm"></video>
  </div>
</div>

<h2>MOV</h2>
<div class="row">
  <div class="checkerboard">
    <h2>idle-loop.mov</h2>
    <video loop muted autoplay playsinline src="/skins/mint/idle-loop.mov"></video>
  </div>
  <div class="checkerboard">
    <h2>typing.mov</h2>
    <video loop muted autoplay playsinline src="/skins/mint/typing.mov"></video>
  </div>
</div>

<script>
  const ua = navigator.userAgent;
  const isSafari = ua.includes('Safari') && !ua.includes('Chrome');
  document.getElementById('browser').textContent =
    `Browser: ${isSafari ? 'Safari' : 'Chrome/Other'}`;
</script>
</body>
</html>
