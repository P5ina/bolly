id: com.triangle_int.bolly_desktop

runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk

command: bolly-desktop
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=ipc
  - --share=network
  - --talk-name=org.kde.StatusNotifierWatcher
  - --filesystem=xdg-run/tray-icon:create
  # Accessibility (for computer use)
  - --talk-name=org.a11y.Bus

modules:
  - name: binary
    buildsystem: simple

    sources:
      - type: file
        path: flatpak.metainfo.xml
      # Update URL and sha256 for each release
      - type: file
        url: https://github.com/triangle-int/bolly/releases/download/desktop-v0.1.0/bolly-desktop_0.1.0_amd64.deb
        sha256: PLACEHOLDER_SHA256
        only-arches: [x86_64]

    build-commands:
      - set -e
      - mkdir deb-extract
      - ar -x *.deb --output deb-extract
      - tar -C deb-extract -xf deb-extract/data.tar.gz
      - install -Dm755 deb-extract/usr/bin/bolly-desktop /app/bin/bolly-desktop
      - mkdir -p /app/lib/bolly-desktop
      - cp -r deb-extract/usr/lib/bolly-desktop/. /app/lib/bolly-desktop
      - find /app/lib/bolly-desktop -type f -exec chmod 644 {} \;
      - sed -i 's/^Icon=.*/Icon=com.triangle_int.bolly_desktop/' deb-extract/usr/share/applications/bolly-desktop.desktop
      - install -Dm644 deb-extract/usr/share/applications/bolly-desktop.desktop /app/share/applications/com.triangle_int.bolly_desktop.desktop
      - install -Dm644 deb-extract/usr/share/icons/hicolor/128x128/apps/bolly-desktop.png /app/share/icons/hicolor/128x128/apps/com.triangle_int.bolly_desktop.png
      - install -Dm644 deb-extract/usr/share/icons/hicolor/32x32/apps/bolly-desktop.png /app/share/icons/hicolor/32x32/apps/com.triangle_int.bolly_desktop.png
      - install -Dm644 flatpak.metainfo.xml /app/share/metainfo/com.triangle_int.bolly_desktop.metainfo.xml
