name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'client/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      update_machines:
        description: 'Update all tenant machines'
        type: boolean
        default: false

env:
  IMAGE: registry.fly.io/bolly:latest

jobs:
  build:
    runs-on: ubuntu-latest-16core
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Auth with Fly registry
        uses: docker/login-action@v3
        with:
          registry: registry.fly.io
          username: x
          password: ${{ secrets.FLY_API_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update all tenant machines
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.update_machines)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: ./scripts/update-machines.sh "$IMAGE"
