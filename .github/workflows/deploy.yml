name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "client/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - "scripts/**"
      - ".github/workflows/**"
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      update_machines:
        description: "Update all tenant machines"
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

env:
  FLY_IMAGE: registry.fly.io/bolly:latest

jobs:
  # Build binary with embedded client
  build-binary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Build client
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Build client
        run: |
          corepack enable
          cd client
          pnpm install --frozen-lockfile
          pnpm build

      # Build server (with embedded client)
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build server
        run: GIT_HASH=${{ github.sha }} cargo build --release -p server

      - name: Prepare binary
        run: |
          cp target/release/server bolly-x86_64-unknown-linux-gnu
          chmod +x bolly-x86_64-unknown-linux-gnu

      - uses: actions/upload-artifact@v5
        with:
          name: binary
          path: bolly-x86_64-unknown-linux-gnu

  # Publish binary to GitHub releases
  publish:
    needs: build-binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v5
        with:
          name: binary

      - name: Publish nightly release
        if: github.ref == 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x bolly-x86_64-unknown-linux-gnu
          gh release delete nightly --yes 2>/dev/null || true
          git tag -f nightly
          git push origin nightly --force
          gh release create nightly \
            --title "Nightly $(date -u +%Y-%m-%d)" \
            --notes "Auto-built from main ($(git rev-parse --short HEAD))" \
            --prerelease \
            bolly-x86_64-unknown-linux-gnu

      - name: Collect commits for changelog
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          prev_tag=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -z "$prev_tag" ]; then
            git log --oneline > /tmp/commits.txt
          else
            git log --oneline "${prev_tag}..HEAD" > /tmp/commits.txt
          fi

      - name: Generate changelog with Claude
        if: startsWith(github.ref, 'refs/tags/v')
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Read /tmp/commits.txt containing git commits since the last release.
            Write a polished, user-friendly changelog in markdown for a stable release.
            Group by: Features, Fixes, Improvements. Skip CI/merge/chore commits.
            One line per change, no commit hashes. Be concise but descriptive.
            Write the result to /tmp/changelog.md

      - name: Create stable release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f /tmp/changelog.md ]; then
            body=$(cat /tmp/changelog.md)
          else
            body=$(cat /tmp/commits.txt | sed 's/^/- /')
          fi
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "$body" \
            bolly-x86_64-unknown-linux-gnu

  # Build and push runtime-only Docker image (no binary — downloaded on startup)
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3

      - name: Auth with Fly registry
        uses: docker/login-action@v3
        with:
          registry: registry.fly.io
          username: x
          password: ${{ secrets.FLY_API_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.FLY_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Machines update themselves — users click "update now" in settings
  # No automatic restarts that wipe system packages
