name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'client/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile'
      - 'scripts/**'
      - '.github/workflows/**'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      update_machines:
        description: 'Update all tenant machines'
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

env:
  FLY_IMAGE: registry.fly.io/bolly:latest
  FLY_NIGHTLY: registry.fly.io/bolly:nightly
  DOCKERHUB_IMAGE: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      # Always auth with Fly registry
      - name: Auth with Fly registry
        uses: docker/login-action@v3
        with:
          registry: registry.fly.io
          username: x
          password: ${{ secrets.FLY_API_TOKEN }}

      # Auth with Docker Hub on tags only
      - name: Auth with Docker Hub
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Docker Hub tags (only on release)
      - name: Docker Hub meta
        if: startsWith(github.ref, 'refs/tags/v')
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      # Build and push — always Fly, + Docker Hub on tags
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            GIT_HASH=${{ github.sha }}
          tags: |
            ${{ env.FLY_IMAGE }}
            ${{ !startsWith(github.ref, 'refs/tags/v') && env.FLY_NIGHTLY || '' }}
            ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ startsWith(github.ref, 'refs/tags/v') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Update nightly machines on every push to main
      - name: Update nightly machines
        if: github.ref == 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/v')
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: ./scripts/update-machines.sh "$FLY_NIGHTLY"

      # Update stable machines on release or manual
      - name: Update stable machines
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.update_machines)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: ./scripts/update-machines.sh "$FLY_IMAGE"

      # GitHub Release — only on tags
      - name: Generate changelog
        if: startsWith(github.ref, 'refs/tags/v')
        id: changelog
        run: |
          prev_tag=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -z "$prev_tag" ]; then
            log=$(git log --oneline)
          else
            log=$(git log --oneline "${prev_tag}..HEAD")
          fi
          {
            echo "body<<EOF"
            echo "## What's Changed"
            echo ""
            echo "$log" | sed 's/^/- /'
            echo ""
            echo "## Docker"
            echo ""
            echo '```bash'
            echo "docker pull docker.io/${{ env.DOCKERHUB_IMAGE }}:${{ github.ref_name }}"
            echo '```'
            echo ""
            echo '```bash'
            echo "docker run -d \\"
            echo "  -p 8080:8080 \\"
            echo "  -v bolly-data:/data \\"
            echo "  docker.io/${{ env.DOCKERHUB_IMAGE }}:${{ github.ref_name }}"
            echo '```'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          generate_release_notes: false
