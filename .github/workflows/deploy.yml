name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "client/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - "scripts/**"
      - ".github/workflows/**"
  workflow_dispatch:
    inputs:
      update_machines:
        description: "Update all tenant machines"
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

env:
  FLY_IMAGE: registry.fly.io/bolly:latest

jobs:
  # Build binary with embedded client
  build-binary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Build client
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Build client
        run: |
          corepack enable
          cd client
          pnpm install --frozen-lockfile
          pnpm build

      # Build server (with embedded client)
      - name: Install protoc
        run: sudo apt-get update -qq && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build server
        run: GIT_HASH=${{ github.sha }} cargo build --release -p server

      - name: Prepare binary
        run: |
          cp target/release/server bolly-x86_64-unknown-linux-gnu
          chmod +x bolly-x86_64-unknown-linux-gnu

      - uses: actions/upload-artifact@v7
        with:
          name: binary
          path: bolly-x86_64-unknown-linux-gnu
          retention-days: 1

  # Publish binary to GitHub releases
  publish:
    needs: build-binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          name: binary

      - name: Publish nightly release
        if: github.ref == 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x bolly-x86_64-unknown-linux-gnu
          gh release delete nightly --yes 2>/dev/null || true
          git tag -f nightly
          git push origin nightly --force
          gh release create nightly \
            --title "Nightly $(date -u +%Y-%m-%d)" \
            --notes "Auto-built from main ($(git rev-parse --short HEAD))" \
            --prerelease \
            bolly-x86_64-unknown-linux-gnu

      # Stable releases handled by release.yml (triggered on v* tags)

  # Build and push runtime-only Docker image (no binary — downloaded on startup)
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4

      - name: Auth with Fly registry
        uses: docker/login-action@v4
        with:
          registry: registry.fly.io
          username: x
          password: ${{ secrets.FLY_API_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.FLY_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Machines update themselves — users click "update now" in settings
  # No automatic restarts that wipe system packages
