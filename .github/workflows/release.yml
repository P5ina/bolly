name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  # ── Server binaries (all platforms) ──
  server:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: bolly-x86_64-unknown-linux-gnu
            ext: ''
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: bolly-aarch64-apple-darwin
            ext: ''
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: bolly-x86_64-pc-windows-msvc.exe
            ext: '.exe'

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Build client
        run: |
          cd client
          pnpm install --frozen-lockfile
          pnpm build

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install protoc
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update -qq && sudo apt-get install -y protobuf-compiler
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install protobuf
          elif [ "$RUNNER_OS" = "Windows" ]; then
            choco install protoc -y
          fi

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build server
        run: cargo build --release -p server --target ${{ matrix.target }}
        env:
          GIT_HASH: ${{ github.sha }}

      - name: Prepare artifact
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/server${{ matrix.ext }} ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }} 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.target }}
          path: ${{ matrix.artifact }}
          retention-days: 1

  # ── Create GitHub Release with all server binaries ──
  create-release:
    needs: server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: server-*
          merge-multiple: true

      - name: Collect changelog
        run: |
          prev_tag=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -z "$prev_tag" ]; then
            git log --oneline > /tmp/commits.txt
          else
            git log --oneline "${prev_tag}..HEAD" > /tmp/commits.txt
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x bolly-* 2>/dev/null || true
          body=$(cat /tmp/commits.txt | sed 's/^/- /')
          gh release create "${{ github.ref_name }}" \
            --title "Bolly ${{ github.ref_name }}" \
            --notes "$body" \
            --draft \
            bolly-*

  # ── Desktop apps (macOS, Windows, Linux) ──
  desktop:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install protoc
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update -qq && sudo apt-get install -y protobuf-compiler
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install protobuf
          elif [ "$RUNNER_OS" = "Windows" ]; then
            choco install protoc -y
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './desktop/src-tauri -> target'

      - name: Install frontend dependencies
        working-directory: desktop
        run: pnpm install

      - name: Check Apple signing
        id: apple-signing
        shell: bash
        run: |
          if [ -n "$APPLE_CERT" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE }}

      - name: Build and upload to release (signed)
        if: matrix.platform == 'macos-latest' && steps.apple-signing.outputs.enabled == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'Bolly ${{ github.ref_name }}'
          releaseBody: ''
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Build and upload to release (unsigned)
        if: matrix.platform != 'macos-latest' || steps.apple-signing.outputs.enabled != 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'Bolly ${{ github.ref_name }}'
          releaseBody: ''
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # ── Docker image ──
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4

      - name: Auth with Fly registry
        uses: docker/login-action@v4
        with:
          registry: registry.fly.io
          username: x
          password: ${{ secrets.FLY_API_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: registry.fly.io/bolly:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
