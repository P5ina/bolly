host = "0.0.0.0"
port = 26559

# Set a token to protect your API (leave empty for no auth)
auth_token = ""

# Path to pre-built client files (leave empty to skip static serving)
# In Docker: static_dir = "/opt/bolly/static"
static_dir = ""

[llm]
provider = "anthropic"       # anthropic, openai, openrouter
model = "claude-sonnet-4-6"  # model override (optional)

[llm.tokens]
ANTHROPIC = ""       # Required — Anthropic API key (sk-ant-...)
GOOGLE_AI = ""       # Optional — Google AI / Gemini (vector memory search)
ELEVENLABS = ""      # Optional — ElevenLabs (text-to-speech)
OPENROUTER = ""      # Optional — OpenRouter (video/music analysis)

# Optional: set FAL_KEY env var for AI image generation via fal.ai MCP

# Email is configured per-instance via Settings UI
