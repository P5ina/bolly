host = "0.0.0.0"
port = 8080

# Set a token to protect your API (leave empty for no auth)
auth_token = ""

# Path to pre-built client files (leave empty to skip static serving)
# In Docker: static_dir = "/opt/bolly/static"
static_dir = ""

[llm]
provider = "anthropic"
model = "claude-sonnet-4-6"

[llm.tokens]
OPEN_AI = ""
ANTHROPIC = ""
BRAVE_SEARCH = ""

# Email is configured per-instance via Settings UI (stored in instances/{slug}/email.toml)
